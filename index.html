<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 가족 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="manifest" href="/calendar/manifest.json">
<link rel="apple-touch-icon" href="/calendar/icon-192.png">
<meta name="theme-color" content="#22C197">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가족 캘린더">
<style>
  :root {
    --dad:#3A86FF;--dad-light:#EBF2FF;--dad-dark:#1A5FCC;
    --mom:#E05C8A;--mom-light:#FCEEF4;--mom-dark:#B03060;
    --child:#22C197;--child-light:#E1F8F2;--child-dark:#0F8F6A;
    --bg:#F5F4F0;--surface:#FFFFFF;
    --border:rgba(0,0,0,0.08);--text:#1A1A1A;--text-muted:#888880;
    --radius:16px;--shadow:0 2px 16px rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{background:var(--surface);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.10);padding:40px 36px;width:100%;max-width:420px;text-align:center;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .login-logo{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px;}
  .login-logo span{color:var(--child-dark);}
  .login-sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;}
  .login-section-title{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:12px;}
  .member-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
  .member-login-btn{display:flex;align-items:center;gap:14px;padding:14px 20px;border-radius:14px;border:2px solid transparent;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:500;transition:all .18s;text-align:left;}
  .member-login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.10);}
  .member-login-btn:active{transform:translateY(0);}
  .mlb-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .mlb-info{flex:1;}
  .mlb-name{font-size:15px;font-weight:700;}
  .mlb-desc{font-size:12px;opacity:.65;margin-top:2px;}
  .mlb-arrow{font-size:18px;opacity:.4;}
  .pin-area{display:none;animation:fadeUp .25s ease;}
  .pin-back{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);margin-bottom:20px;font-family:'Noto Sans KR',sans-serif;padding:0;}
  .pin-back:hover{color:var(--text);}
  .pin-who{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:20px;}
  .pin-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .pin-name{font-size:20px;font-weight:700;}
  .pin-label{font-size:13px;color:var(--text-muted);margin-bottom:14px;}
  .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:18px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
  .pin-dot.filled{border-color:var(--cur-color,#3A86FF);background:var(--cur-color,#3A86FF);}
  .pin-input{position:absolute;opacity:0;width:1px;height:1px;}
  .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .pk-btn{padding:16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:18px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;color:var(--text);}
  .pk-btn:hover{background:#EEEEE9;}
  .pk-btn:active{transform:scale(.95);}
  .pk-del{background:none;border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:16px;cursor:pointer;transition:all .12s;color:var(--text-muted);}
  .pk-del:hover{background:#EEEEE9;}
  .pin-error{font-size:12px;color:#E24B4A;min-height:18px;margin-bottom:4px;}
  .pin-hint{font-size:11px;color:var(--text-muted);}
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;z-index:100;}
  .header-row1{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .header-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .app-title{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-0.3px;flex-shrink:0;}
  .app-title span{color:var(--child-dark);}
  .header-right-top{display:flex;align-items:center;gap:8px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s;flex-shrink:0;}
  .sync-dot.connected{background:var(--child);}
  .sync-label{font-size:11px;color:var(--text-muted);}
  .member-filters{display:flex;gap:5px;flex-wrap:wrap;}
  .mf-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;background:white;font-family:'Noto Sans KR',sans-serif;}
  .mf-btn.off{opacity:.3;}
  .mf-dot{width:7px;height:7px;border-radius:50%;}
  .cur-user-badge{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:500;}
  .cub-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .logout-btn:hover{background:var(--bg);color:var(--text);}
  .change-pin-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .change-pin-btn:hover{background:var(--bg);color:var(--text);}
  .app-body{display:grid;grid-template-columns:1fr 300px;gap:20px;padding:20px 24px;max-width:1200px;margin:0 auto;}
  @media(max-width:768px){.app-body{grid-template-columns:1fr;padding:12px;}}
  .cal-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);}
  .cal-nav button{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .cal-nav button:hover{background:var(--bg);color:var(--text);}
  .cal-month{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
  .cal-month span{color:var(--child-dark);}
  .today-jump{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;}
  .today-jump:hover{background:var(--bg);}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;background:var(--bg);}
  .weekdays span{text-align:center;font-size:11px;font-weight:500;color:var(--text-muted);padding:8px 0;}
  .weekdays span:first-child{color:#E24B4A;}
  .weekdays span:last-child{color:var(--dad);}
  .days-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border);}
  .day{height:90px;padding:8px 6px 6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;overflow:hidden;}
  .day:nth-child(7n){border-right:none;}
  .day:hover{background:#FAFAF8;}
  .day.other-month{background:#FAFAF8;}
  .day.other-month .dnum{color:#CCC;}
  .day.today{background:#FFFBF0;}
  .day.selected{background:#F0F7FF;outline:2px solid var(--dad);outline-offset:-2px;}
  .dnum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .dnum{font-size:13px;font-weight:500;color:var(--text);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .day.today .dnum{background:var(--text)!important;color:white!important;}
  .day.sun .dnum{color:#E24B4A;}
  .day.sat .dnum{color:var(--dad);}
  .ecount{font-size:10px;color:var(--text-muted);}
  .day-pills{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
  .epill{font-size:10px;padding:2px 5px;border-radius:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:500;line-height:1.4;max-width:100%;display:block;}
  .more-label{font-size:10px;color:var(--text-muted);padding:0 4px;}
  .holiday-name{font-size:9px;color:#E24B4A;font-weight:500;line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;}
  .anniversary-name{font-size:9px;color:#E05C8A;font-weight:500;line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;}
  .solar-name{font-size:9px;color:#aaa;font-weight:400;line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;}
  .day.holiday .dnum{color:#E24B4A !important;}
  .day.holiday.today .dnum{background:#E24B4A !important;color:white !important;}
  .detail-panel{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:16px;display:none;animation:slideIn .2s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .dp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
  .dp-date-title{font-size:16px;font-weight:700;}
  .dp-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:4px 8px;border-radius:6px;}
  .dp-close:hover{background:var(--bg);}
  .dp-body{display:grid;grid-template-columns:1fr 280px;}
  @media(max-width:600px){.dp-body{grid-template-columns:1fr;}}
  .dp-evts{padding:16px 20px;border-right:1px solid var(--border);min-height:200px;}
  .dp-evts-title{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
  .evt-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg);margin-bottom:8px;transition:background .1s;}
  .evt-row:hover{background:#EEEDE9;}
  .er-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .er-info{flex:1;min-width:0;}
  .er-title{font-size:14px;font-weight:500;}
  .er-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .er-actions{display:flex;gap:4px;flex-shrink:0;}
  .er-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:4px 9px;border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
  .er-btn.edit{color:var(--dad-dark);border:1px solid var(--dad-light);}
  .er-btn.edit:hover{background:var(--dad-light);}
  .er-btn.del{color:#999;border:1px solid var(--border);}
  .er-btn.del:hover{background:#FCEEF4;color:var(--mom-dark);border-color:var(--mom-light);}
  .er-other{font-size:12px;color:var(--text-muted);padding-top:2px;flex-shrink:0;}
  .no-evt{font-size:13px;color:var(--text-muted);text-align:center;padding:28px 0;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:center;justify-content:center;padding:20px;}
  .modal-bg.open{display:flex;}
  .modal-box{background:var(--surface);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 16px 48px rgba(0,0,0,.15);animation:fadeUp .2s ease;}
  .modal-box h3{font-size:16px;font-weight:700;margin-bottom:18px;}
  .mrow{margin-bottom:12px;}
  .mrow label{display:block;font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:4px;}
  .mrow input{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;}
  .mrow input:focus{outline:none;border-color:var(--dad);background:white;}
  .modal-btns{display:flex;gap:8px;margin-top:20px;}
  .m-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);}
  .m-cancel:hover{background:var(--bg);}
  .m-save{flex:2;padding:10px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:white;}
  .m-save:hover{opacity:.88;}
  .dp-form{padding:16px 20px;}
  .dp-form-title{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
  .frow{margin-bottom:10px;}
  .frow label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:500;}
  .frow input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;}
  .frow input:focus{outline:none;border-color:var(--dad);background:white;}
  .add-btn{width:100%;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:var(--text);color:white;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .add-btn:hover{opacity:.85;}
  .add-btn:active{transform:scale(.98);}
  .sidebar{display:flex;flex-direction:column;gap:14px;}
  .side-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
  .side-card h3{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:14px;letter-spacing:.3px;}
  .today-evt-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
  .today-evt-row:last-child{border-bottom:none;}
  .ter-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;}
  .ter-title{font-size:13px;font-weight:500;}
  .ter-meta{font-size:11px;color:var(--text-muted);margin-top:1px;}
  .upc-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);}
  .upc-row:last-child{border-bottom:none;}
  .upc-date{font-size:10px;font-weight:700;color:var(--text-muted);min-width:32px;padding-top:2px;}
  .upc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .upc-title{font-size:12px;font-weight:500;}
  .upc-meta{font-size:10px;color:var(--text-muted);margin-top:1px;}
  .legend-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
  .leg-swatch{width:12px;height:12px;border-radius:3px;}
  .leg-name{font-size:13px;font-weight:500;flex:1;}
  .leg-count{font-size:12px;color:var(--text-muted);}
  .no-data{font-size:12px;color:var(--text-muted);text-align:center;padding:16px 0;}
  .pin-change-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center;padding:20px;}
  .pin-change-bg.open{display:flex;}
  .pin-change-box{background:var(--surface);border-radius:22px;padding:28px 24px 22px;width:100%;max-width:320px;box-shadow:0 16px 48px rgba(0,0,0,.15);animation:fadeUp .2s ease;text-align:center;}
  .pcb-title{font-size:17px;font-weight:700;margin-bottom:4px;color:var(--text);}
  .pcb-sub{font-size:12px;color:var(--text-muted);margin-bottom:20px;}
  .pcb-step{display:none;}
  .pcb-step.active{display:block;}
  .pcb-label{font-size:13px;color:var(--text-muted);margin-bottom:12px;}
  .pcb-dots{display:flex;justify-content:center;gap:14px;margin-bottom:14px;}
  .pcb-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
  .pcb-dot.filled{border-color:var(--cur-color,#3A86FF);background:var(--cur-color,#3A86FF);}
  .pcb-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
  .pcb-error{font-size:12px;color:#E24B4A;min-height:18px;margin-bottom:4px;}
  .pcb-cancel{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);margin-top:4px;}
  .pcb-cancel:hover{background:var(--bg);}
  .change-pin-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .change-pin-btn:hover{background:var(--bg);color:var(--text);}
  .admin-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
  .admin-bg.open{display:flex;}
  .admin-box{background:var(--surface);border-radius:22px;padding:28px 24px 22px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeUp .2s ease;}
  .admin-title{font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
  .admin-sub{font-size:12px;color:var(--text-muted);margin-bottom:20px;}
  .admin-member-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--bg);margin-bottom:8px;}
  .admin-member-info{flex:1;}
  .admin-member-name{font-size:14px;font-weight:600;}
  .admin-member-pin{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .admin-reset-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:white;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#E24B4A;font-weight:500;transition:all .15s;}
  .admin-reset-btn:hover{background:#fff0f0;border-color:#E24B4A;}
  .admin-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  .admin-cancel{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);}
  .admin-cancel:hover{background:var(--bg);}
  .admin-pin-area{text-align:center;}
  .admin-pin-label{font-size:13px;color:var(--text-muted);margin-bottom:12px;}
  .admin-pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:14px;}
  .admin-pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
  .admin-pin-dot.filled{border-color:#E24B4A;background:#E24B4A;}
  .admin-err{font-size:12px;color:#E24B4A;min-height:18px;margin-bottom:4px;text-align:center;}
  .loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
  .loading.hidden{display:none;}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--child);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading p{font-size:13px;color:var(--text-muted);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;transition:transform .3s ease;z-index:400;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .app-screen{display:none;}
  .app-screen.on{display:block;}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><p>불러오는 중...</p></div>
<div class="toast" id="toast"></div>

<!-- ══ LOGIN ══ -->
<div class="login-screen" id="login-screen" style="display:none;">
  <div class="login-card">
    <div class="login-logo">우리 가족<span> 캘린더</span></div>

/* ── FCM 토큰 등록 ── */
async function registerPushToken(memberId) {
  try {
    // v20260420: 기존 SW 강제 갱신 — 이전 캐시된 SW를 해제하고 새로 등록
    const SW_VERSION = '20260421';
    if (localStorage.getItem('sw_version') !== SW_VERSION) {
      const oldRegs = await navigator.serviceWorker.getRegistrations();
      for (const r of oldRegs) await r.unregister();
      localStorage.setItem('sw_version', SW_VERSION);
      console.log('SW 강제 갱신 완료: v' + SW_VERSION);
    }
    const swReg = await navigator.serviceWorker.register("/calendar/firebase-messaging-sw.js", { updateViaCache: "none" });
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      console.log("알림 권한 거부됨");
      return;
    }
    const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
    if (token) {
      let deviceId = localStorage.getItem('fcm_device_id');
      if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).slice(2, 12);
        localStorage.setItem('fcm_device_id', deviceId);
      }
      await update(ref(db, `fcmTokens/${memberId}`), { [deviceId]: token });
      console.log("FCM 토큰 등록 완료:", deviceId);
    }
  } catch (e) {
    console.log("FCM 등록 실패:", e);
  }
}

const holidayApiCache = {};
const FUNCTIONS_URL = 'https://us-central1-hansong2ne-calendar.cloudfunctions.net/getHolidays';

async function loadHolidaysFromApi(year) {
  const key = String(year);
  if (holidayApiCache[key]) return;
  try {
    const res = await fetch(`${FUNCTIONS_URL}?year=${year}`);
    const data = await res.json();
    if (!data.holidays) return;
    holidayApiCache[key] = {};
    data.holidays.forEach(h => {
      const ds = `${h.date.slice(0,4)}-${h.date.slice(4,6)}-${h.date.slice(6,8)}`;
      holidayApiCache[key][ds] = {
        name: h.name,
        type: h.isHoliday ? 'holiday' : 'anniversary'
      };
    });
    console.log(`${year}년 공휴일 API 로드 완료:`, Object.keys(holidayApiCache[key]).length, '건');
  } catch(e) {
    console.log(`${year}년 공휴일 API 실패, fallback 사용:`, e.message);
  }
}

function buildPcbKeypad(step) {
  const kp = document.getElementById(`pcb-kp${step}`); kp.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k=>{
    if(k===''){const sp=document.createElement('div');kp.appendChild(sp);return;}
    const btn=document.createElement('button');
    btn.className=k==='⌫'?'pk-del':'pk-btn';
    btn.style.cssText='padding:13px;font-size:17px;';
    btn.textContent=k;
    btn.onclick=()=>handlePcbKey(step,k);
    kp.appendChild(btn);
  });
}
function updatePcbDots(step) {
  const buf = step===1?pcbBuf1:step===2?pcbBuf2:pcbBuf3;
  for(let i=0;i<4;i++){
    const d=document.getElementById(`pcd${step}-${i}`);
    d.classList.toggle('filled', i<buf.length);

function handlePcbKey(step, k) {
  let buf = step===1?pcbBuf1:step===2?pcbBuf2:pcbBuf3;
  if(k==='⌫') buf=buf.slice(0,-1);
  else if(buf.length<4) buf+=k;
  if(step===1) pcbBuf1=buf;
  else if(step===2) pcbBuf2=buf;
  else pcbBuf3=buf;
  updatePcbDots(step);
  if(buf.length===4) setTimeout(()=>handlePcbComplete(step),150);
}
async function handlePcbComplete(step) {

      document.getElementById('pcb-err1').textContent='연결 오류가 발생했어요';

    document.getElementById('pcb-step2').classList.remove('active');
    document.getElementById('pcb-step3').classList.add('active');
    document.getElementById('pcb-sub').textContent='새 PIN을 한 번 더 확인할게요';
    pcbStep=3;
  } else if(step===3) {
    if(pcbBuf2===pcbBuf3){
      update(ref(db,`pins`),{[currentUser.id]:pcbBuf2}).then(()=>{
        closePinChange();
        toast(`${currentUser.label}의 PIN이 변경됐어요 ✓`);
      });
    } else {
      document.getElementById('pcb-err3').textContent='PIN이 일치하지 않아요. 다시 입력해주세요';
      pcbBuf3=''; updatePcbDots(3);
      setTimeout(()=>{
        document.getElementById('pcb-step3').classList.remove('active');
        document.getElementById('pcb-step2').classList.add('active');
        document.getElementById('pcb-sub').textContent='새로운 PIN을 다시 입력해주세요';
        pcbBuf2=''; updatePcbDots(2); pcbStep=2;
      },800);
    }
  }
}

const ADMIN_PIN_DEFAULT = '0000';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

let adminBuf = '';
let adminMode = 'login';
let adminChangeBuf1 = '', adminChangeBuf2 = '';
let adminChangeStep = 1;

window.openAdmin = function() {

function buildAdminKeypad(mode) {
  const kp = document.getElementById('admin-keypad'); kp.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k => {
    if (k === '') { kp.appendChild(document.createElement('div')); return; }
    const btn = document.createElement('button');
    btn.className = k === '⌫' ? 'pk-del' : 'pk-btn';
    btn.style.cssText = 'padding:13px;font-size:17px;';
    btn.textContent = k;
    btn.onclick = () => handleAdminKey(k, mode);
    kp.appendChild(btn);
  });
}

function handleAdminKey(k, mode) {
  if (mode === 'login') {
    if (k === '⌫') adminBuf = adminBuf.slice(0,-1);
    else if (adminBuf.length < 4) adminBuf += k;
    updateAdminDots('login');
    if (adminBuf.length === 4) setTimeout(tryAdminLogin, 150);
  } else if (mode === 'change1') {
    if (k === '⌫') adminChangeBuf1 = adminChangeBuf1.slice(0,-1);
    else if (adminChangeBuf1.length < 4) adminChangeBuf1 += k;
    updateAdminDots('change1');
    if (adminChangeBuf1.length === 4) setTimeout(adminChangePinStep2, 150);
  } else if (mode === 'change2') {
    if (k === '⌫') adminChangeBuf2 = adminChangeBuf2.slice(0,-1);
    else if (adminChangeBuf2.length < 4) adminChangeBuf2 += k;
    updateAdminDots('change2');
    if (adminChangeBuf2.length === 4) setTimeout(adminChangePinConfirm, 150);
  }
}

function updateAdminDots(mode) {
  const buf = mode === 'login' ? adminBuf : mode === 'change1' ? adminChangeBuf1 : adminChangeBuf2;
  for (let i = 0; i < 4; i++) {
    document.getElementById(`apd${i}`).classList.toggle('filled', i < buf.length);
  }
}

async function tryAdminLogin() {
  const inputHash = await sha256(adminBuf);
  try {
    const snap = await get(ref(db, 'admin/pin'));
    const storedHash = snap.val();
    let valid = false;
    if (storedHash) {
      valid = (inputHash === storedHash);
    } else {
      const defaultHash = await sha256(ADMIN_PIN_DEFAULT);
      if (inputHash === defaultHash) {
        await update(ref(db, 'admin'), { pin: defaultHash });
        valid = true;
      }
    }
    if (valid) {
      adminMode = 'manage';
      document.getElementById('admin-pin-area').style.display = 'none';
      document.getElementById('admin-manage-area').style.display = 'block';
      document.getElementById('admin-sub').textContent = '멤버별 PIN을 초기화할 수 있어요';
      renderAdminMemberList();
    } else {
      document.getElementById('admin-pin-err').textContent = '관리자 PIN이 틀렸어요';
      adminBuf = ''; updateAdminDots('login');
    }
  } catch(e) {
    document.getElementById('admin-pin-err').textContent = '연결 오류가 발생했어요';
    adminBuf = ''; updateAdminDots('login');
  }
}

window.openAdminChangePin = function() {
  adminChangeBuf1 = ''; adminChangeBuf2 = ''; adminChangeStep = 1;
  document.getElementById('admin-sub').textContent = '새 관리자 PIN을 입력하세요';

};

function adminChangePinStep2() {
  adminChangeStep = 2;
  document.getElementById('admin-sub').textContent = '새 PIN을 한 번 더 입력하세요';
  document.querySelector('.admin-pin-label').textContent = 'PIN 확인';

}

async function adminChangePinConfirm() {
  if (adminChangeBuf1 === adminChangeBuf2) {
    const newHash = await sha256(adminChangeBuf1);
    await update(ref(db, 'admin'), { pin: newHash });
    document.getElementById('admin-pin-area').style.display = 'none';
    document.getElementById('admin-manage-area').style.display = 'block';
    document.getElementById('admin-sub').textContent = '멤버별 PIN을 초기화할 수 있어요';
    document.querySelector('.admin-pin-label').textContent = '관리자 PIN 4자리';
    toast('관리자 PIN이 변경됐어요 ✓');
    renderAdminMemberList();
  } else {
    document.getElementById('admin-pin-err').textContent = 'PIN이 일치하지 않아요. 다시 시도해주세요';
    adminChangeBuf1 = ''; adminChangeBuf2 = '';
    for (let i = 0; i < 4; i++) document.getElementById(`apd${i}`).classList.remove('filled');
    setTimeout(() => {
      document.getElementById('admin-pin-err').textContent = '';
      adminChangePinStep2 && buildAdminKeypad('change1');
      document.getElementById('admin-sub').textContent = '새 관리자 PIN을 다시 입력하세요';
      document.querySelector('.admin-pin-label').textContent = '새 관리자 PIN 4자리';
      buildAdminKeypad('change1');
      adminChangeStep = 1;
    }, 900);
  }
}

function renderAdminMemberList() {
  const list = document.getElementById('admin-member-list');
  list.innerHTML = '';
  onValue(ref(db, 'pins'), snap => {
    const pins = snap.val() || {};
    list.innerHTML = '';
    MEMBERS.forEach(m => {
      const pinStatus = pins[m.id] ? '변경됨' : '기본값';
      const row = document.createElement('div');
      row.className = 'admin-member-row';
      row.innerHTML = `
        <div style="font-size:24px;">${m.emoji}</div>
        <div class="admin-member-info">
          <div class="admin-member-name" style="color:${m.dark}">${m.label}</div>
          <div class="admin-member-pin">PIN 상태: ${pinStatus} · 초기화시 기본 PIN으로 복원</div>
        </div>
        <button class="admin-reset-btn" onclick="adminResetPin('${m.id}','${m.label}','${m.pin}')">초기화</button>
      `;
      list.appendChild(row);
    });
    const changeBtn = document.createElement('button');
    changeBtn.style.cssText = 'width:100%;margin-top:4px;padding:9px;border-radius:10px;border:1.5px dashed rgba(226,75,74,0.4);background:none;cursor:pointer;font-size:12px;font-family:"Noto Sans KR",sans-serif;color:#E24B4A;';
    changeBtn.textContent = '🔑 관리자 PIN 변경';
    changeBtn.onclick = openAdminChangePin;
    list.appendChild(changeBtn);
  }, { onlyOnce: true });
}

window.adminResetPin = async function(memberId, memberLabel, defaultPin) {
  if (!confirm(`${memberLabel}의 PIN을 기본값(${defaultPin})으로 초기화할까요?`)) return;

};

};

function getDayInfo(ds) {
  if (!ds) return null;
  const year = ds.slice(0, 4);
  if (holidayApiCache[year] && holidayApiCache[year][ds]) return holidayApiCache[year][ds];
  if (LUNAR_HOLIDAYS_FALLBACK[ds]) return LUNAR_HOLIDAYS_FALLBACK[ds];
  const md = ds.slice(5);
  if (HOLIDAYS[md]) return HOLIDAYS[md];
  if (SOLAR_TERMS[ds]) return { name: SOLAR_TERMS[ds], type: 'solar' };
  return null;
}

function renderCalendar() {
  document.getElementById('cal-month').innerHTML = `<span>${curY}년</span> ${MON[curM]}`;
  const grid = document.getElementById('days-grid'); grid.innerHTML = '';
  const fd = new Date(curY,curM,1).getDay();
  const ld = new Date(curY,curM+1,0).getDate();
  const pl = new Date(curY,curM,0).getDate();
  let cells = [];
  for(let i=fd-1;i>=0;i--) cells.push({d:pl-i,cur:false,ds:''});
  for(let d=1;d<=ld;d++) cells.push({d,cur:true,ds:`${curY}-${pad(curM+1)}-${pad(d)}`});
  while(cells.length%7!==0) cells.push({d:cells.length-fd-ld+1,cur:false,ds:''});
  const evts = getEvts();
  cells.forEach((c,i) => {
    const dow = i%7;
    const dayEvts = c.cur ? evts.filter(e=>e.date===c.ds&&filter[e.member]).sort((a,b)=>(a.time||'ZZ:ZZ').localeCompare(b.time||'ZZ:ZZ')) : [];
    const dayInfo = c.cur ? getDayInfo(c.ds) : null;
    const isHoliday = dayInfo && dayInfo.type === 'holiday';
    const el = document.createElement('div');
    el.className = ['day',!c.cur?'other-month':'',c.ds===todayStr?'today':'',c.ds===selDate?'selected':'',dow===0?'sun':dow===6?'sat':'',isHoliday?'holiday':''].filter(Boolean).join(' ');
    const dr=document.createElement('div'); dr.className='dnum-row';
    const dn=document.createElement('span'); dn.className='dnum'; dn.textContent=c.d; dr.appendChild(dn);
    if(dayEvts.length){const ec=document.createElement('span');ec.className='ecount';ec.textContent=dayEvts.length+'건';dr.appendChild(ec);}
    el.appendChild(dr);
    if(c.cur&&c.ds){
      const pills=document.createElement('div'); pills.className='day-pills';
      if(dayInfo) {
        const hl=document.createElement('div');
        if(dayInfo.type==='solar') hl.className='solar-name';
        else if(dayInfo.type==='anniversary') hl.className='anniversary-name';
        else hl.className='holiday-name';
        hl.textContent = dayInfo.name;
        pills.appendChild(hl);
      }
      dayEvts.slice(0,2).forEach(e=>{const m=MEMBERS.find(x=>x.id===e.member);const p=document.createElement('div');p.className='epill';p.style.cssText=`background:${m.light};color:${m.dark};`;p.textContent=(e.time?e.time+' ':'')+e.title;pills.appendChild(p);});
      if(dayEvts.length>2){const mo=document.createElement('div');mo.className='more-label';mo.textContent=`+${dayEvts.length-2}건 더`;pills.appendChild(mo);}
      el.appendChild(pills); el.onclick=()=>openDetail(c.ds);
    }
    grid.appendChild(el);
  });
}

function renderTodaySidebar() {
  const mo=today.getMonth()+1,d=today.getDate(),dow=DOW[today.getDay()];
  document.getElementById('today-header').textContent=`오늘 ${mo}/${d} (${dow})`;
  const list=document.getElementById('today-list');
  const evts=getEvts().filter(e=>e.date===todayStr&&filter[e.member]).sort((a,b)=>(a.time||'ZZ:ZZ').localeCompare(b.time||'ZZ:ZZ'));
  if(!evts.length){list.innerHTML='<div class="no-data">오늘 일정이 없어요</div>';return;}
  list.innerHTML='';
  evts.forEach(e=>{const mem=MEMBERS.find(x=>x.id===e.member);const row=document.createElement('div');row.className='today-evt-row';row.innerHTML=`<div class="ter-dot" style="background:${mem.color}"></div><div><div class="ter-title">${e.title}</div><div class="ter-meta">${mem.label}${e.time?' · '+e.time:''}${e.memo?' · '+e.memo:''}</div></div>`;list.appendChild(row);});
}

function renderUpcoming() {
  const list=document.getElementById('upcoming-list');
  const fut=getEvts().filter(e=>e.date>todayStr&&filter[e.member]).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'')).slice(0,6);
  if(!fut.length){list.innerHTML='<div class="no-data">예정된 일정이 없어요</div>';return;}
  list.innerHTML='';
  fut.forEach(e=>{const mem=MEMBERS.find(x=>x.id===e.member);const pts=e.date.split('-');const row=document.createElement('div');row.className='upc-row';row.innerHTML=`<div class="upc-date">${parseInt(pts[1])}/${parseInt(pts[2])}</div><div class="upc-dot" style="background:${mem.color}"></div><div><div class="upc-title">${e.title}</div><div class="upc-meta">${mem.label}${e.time?' · '+e.time:''}</div></div>`;list.appendChild(row);});
}

function renderLegend() {
  const list=document.getElementById('legend-list'); list.innerHTML='';
  const evts=getEvts().filter(e=>e.date&&e.date.startsWith(`${curY}-${pad(curM+1)}`));
  MEMBERS.forEach(m=>{const cnt=evts.filter(e=>e.member===m.id).length;const row=document.createElement('div');row.className='legend-row';row.innerHTML=`<div class="leg-swatch" style="background:${m.color}"></div><div class="leg-name">${m.label}</div><div class="leg-count">${cnt}건</div>`;list.appendChild(row);});
}

function openDetail(ds) {
  selDate=ds;
  const pts=ds.split('-'),dow=DOW[new Date(ds).getDay()];
  document.getElementById('dp-date-title').textContent=`${parseInt(pts[1])}월 ${parseInt(pts[2])}일 (${dow})`;
  renderDetailEvts();
  const panel=document.getElementById('detail-panel'); panel.style.display='block';
  renderCalendar();
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
window.closeDetail=function(){document.getElementById('detail-panel').style.display='none';selDate=null;renderCalendar();};

function renderDetailEvts() {
  const list=document.getElementById('dp-evt-list');
  const evts=getEvts().filter(e=>e.date===selDate).sort((a,b)=>(a.time||'ZZ:ZZ').localeCompare(b.time||'ZZ:ZZ'));
  if(!evts.length){list.innerHTML='<div class="no-evt">등록된 일정이 없어요</div>';return;}
  list.innerHTML='';
  evts.forEach(e=>{
    const mem=MEMBERS.find(x=>x.id===e.member);
    const mine=isMine(e);
    const row=document.createElement('div'); row.className='evt-row';
    const actionHtml = mine
      ? `<div class="er-actions"><button class="er-btn edit" onclick="openEditModal('${e._key}')">수정</button><button class="er-btn del" onclick="delEvt('${e._key}')">삭제</button></div>`
      : `<div class="er-other" title="${mem.label}의 일정">${mem.emoji}</div>`;
    row.innerHTML=`<div class="er-dot" style="background:${mem.color}"></div><div class="er-info"><div class="er-title">${e.title}</div><div class="er-meta">${mem.label}${e.time?' · '+e.time:''}${e.memo?' · '+e.memo:''}</div></div>${actionHtml}`;
    list.appendChild(row);
  });
}

function renderAll(){renderMemberFilter();renderCalendar();renderTodaySidebar();renderUpcoming();renderLegend();if(selDate)renderDetailEvts();}

const saved = sessionStorage.getItem('loggedMember');
if (saved) {
  const m = MEMBERS.find(x=>x.id===saved);
  if (m) {
    currentUser=m;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').classList.add('on');
    setupApp();
    registerPushToken(m.id);
  } else showLogin();
} else { showLogin(); }
</script>
